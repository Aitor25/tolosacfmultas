const SEASON_MONTHS = ["Ago", "Sep", "Oct", "Nov", "Dic", "Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul"];

function getRequiredMonths() {
  const currentMonthIndex = new Date().getMonth(); 
  let endSlice = currentMonthIndex >= 7 ? currentMonthIndex - 7 + 1 : currentMonthIndex + 5 + 1;
  return SEASON_MONTHS.slice(0, endSlice);
}

// Convierte cualquier URL de Google Sheets a una URL de descarga CSV directa.
// Usa el endpoint /export?format=csv que es más compatible que gviz/tq.
function toDirectCsvUrl(url) {
  if (!url || !url.includes("docs.google.com/spreadsheets/d/")) return url;
  // Si ya es una URL de export CSV, devolverla tal cual
  if (url.includes("export?format=csv") || url.includes("output=csv")) return url;
  
  const idMatch = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
  if (!idMatch) return url;
  const docId = idMatch[1];
  
  // Extraer gid si existe (identifica la hoja concreta)
  const gidMatch = url.match(/[#&?]gid=([0-9]+)/);
  let csvUrl = `https://docs.google.com/spreadsheets/d/${docId}/export?format=csv`;
  if (gidMatch) csvUrl += `&gid=${gidMatch[1]}`;
  return csvUrl;
}

function normalizeSheetData(rawData) {
  if (!rawData || rawData.length === 0) return [];
  
  // Si ya es un array de objetos (como MOCK_SHEET_DATA), lo devolvemos tal cual
  if (!Array.isArray(rawData[0]) && typeof rawData[0] === 'object') {
    return rawData;
  }
  
  // Si es un array de arrays (generado por Papa.parse con header: false)
  if (Array.isArray(rawData[0])) {
     // Detectar si es el Excel complejo en euskera analizando las primeras filas
     const isBasqueSheet = rawData.length > 2 && rawData.slice(0,6).some(r => Array.isArray(r) && (r.includes("MULTAK") || r.includes("HILEROKOA") || r.includes("Abuztua")));
     
     if (isBasqueSheet) {
        const normalized = [];
        const multaMonths = ["Ago","Sep","Oct","Nov","Dic","Ene","Feb","Mar","Abr","May"];
        const cuotaMonths = ["Ago","Sep","Oct","Nov","Dic","Ene","Feb","Mar","Abr","May"];
        const balonMonths = ["Sep","Oct","Nov","Dic","Ene","Feb","Mar","Abr","May"];
        const skipWords = new Set(["abuztua","iraila","urria","azaroa","abendua","urtarrila","otsaila","martxoa","apirila","maiatza","ekaina","multak","hilerokoa","baloiak","bakoitzak guztira","guztira",""]);

        // Detectar en qué columna están los nombres (col 0 o col 1)
        let nameCol = 1;
        for (let i = 0; i < Math.min(rawData.length, 10); i++) {
          const row = rawData[i];
          if (!row) continue;
          const c0 = (row[0]||"").toString().trim();
          const c1 = (row[1]||"").toString().trim();
          if (c0 && !skipWords.has(c0.toLowerCase()) && /[a-zA-ZáéíóúñÁÉÍÓÚÑ]/.test(c0) && c0.includes(" ")) { nameCol = 0; break; }
          if (c1 && !skipWords.has(c1.toLowerCase()) && /[a-zA-ZáéíóúñÁÉÍÓÚÑ]/.test(c1) && c1.includes(" ")) { nameCol = 1; break; }
        }
        const offset = nameCol === 0 ? -1 : 0;

        for (let i = 0; i < rawData.length; i++) {
          const row = rawData[i];
          if (!row || row.length < 5) continue;
          const name = (row[nameCol] || "").toString().trim();
          if (!name || skipWords.has(name.toLowerCase())) continue;
          const obj = { Nombre: name === "Donaciones" ? "DONACIONES" : name === "Gastos" ? "GASTOS" : name };
          multaMonths.forEach((m, idx) => { const v = row[2+offset+idx]; obj[`Multa ${m}`] = v != null ? v.toString().trim() : ""; });
          cuotaMonths.forEach((m, idx) => { const v = row[16+offset+idx]; obj[`Cuota ${m}`] = v != null ? v.toString().trim() : ""; });
          balonMonths.forEach((m, idx) => { const v = row[29+offset+idx]; obj[`Balon ${m}`] = v != null ? v.toString().trim() : ""; });
          normalized.push(obj);
        }
        return normalized;
     } else {
        // Es un CSV normal, usamos la primera fila como cabeceras
        const headers = rawData[0];
        const normalized = [];
        for (let i = 1; i < rawData.length; i++) {
           const obj = {};
           headers.forEach((h, idx) => { obj[h] = rawData[i][idx]; });
           normalized.push(obj);
        }
        return normalized;
     }
  }
  return rawData;
}

function processData(rawData) {
  const requiredMonths = getRequiredMonths();
  
  let totalIngresos = 0;
  let totalGastos = 0;
  let totalDonaciones = 0;
  
  // Initialize monthly stats
  let monthlyStats = {};
  SEASON_MONTHS.forEach(m => { monthlyStats[m] = { ingresos: 0, gastos: 0 }; });

  let playersData = [];
  let adelantosData = [];

  let stats = {
    totalRows: rawData.length,
    validRows: 0,
    ignoredRows: 0,
    logs: []
  };

  rawData.forEach((row, index) => {
    try {
      if (!row || typeof row !== 'object') {
        throw new Error("Formato de fila inválido.");
      }

      const nombreStr = row.Nombre ? row.Nombre.toString().trim() : "";
      
      // Validar fila completamente vacía o sin nombre
      if (!nombreStr) {
        const hasOtherData = Object.keys(row).some(k => k !== "Nombre" && row[k] && row[k].toString().trim() !== "" && row[k].toString().trim() !== "-");
        if (hasOtherData) throw new Error("Fila con datos pero sin nombre especificado en la columna 'Nombre'.");
        return; // Ignorar silenciosamente si está totalmente vacía
      }

      const isGastoRow = nombreStr.toUpperCase() === "GASTOS";
      const isDonacionRow = nombreStr.toUpperCase() === "DONACIONES";
      const isPlayer = !isGastoRow && !isDonacionRow;

      let playerAdelantado = 0;
      let playerIngresado = 0;
      let cuotasDeuda = [];
      let balonesDeuda = [];

      // Recorrer todas las celdas para balances financieros
      Object.keys(row).forEach(key => {
        if (key === "Nombre") return;
        const valStr = row[key] ? row[key].toString().trim() : "";
        if (valStr === "-" || valStr === "") return;

        const valNum = parseFloat(valStr);
        // Sanitización robusta
        if (isNaN(valNum)) {
          throw new Error(`El valor '${valStr}' en la columna '${key}' no es un número válido.`);
        }

        if (valNum !== 0) {
          const isNegative = valNum < 0;
          const isPositive = valNum > 0;
          const absVal = Math.abs(valNum);

          // Sumas globales
          if (isDonacionRow && isPositive) {
             totalDonaciones += valNum;
             totalIngresos += valNum;
          } else if (isGastoRow && isNegative) {
             totalGastos += absVal;
          } else if (isPlayer) {
             if (isPositive) {
               totalIngresos += valNum;
               playerIngresado += valNum;
             }
             if (isNegative) {
               totalGastos += absVal;
               playerAdelantado += absVal;
             }
          }

          // Sumas mensuales
          const monthMatch = SEASON_MONTHS.find(m => key.includes(m));
          if (monthMatch) {
             if (isPositive) monthlyStats[monthMatch].ingresos += valNum;
             if (isNegative) monthlyStats[monthMatch].gastos += absVal;
          }
        }
      });

      // Lógica estricta de deudas solo para jugadores
      if (isPlayer) {
        // Meses en los que NO hay balón (no se cobra, no se marca como moroso)
        const sinBalon = new Set(["Ago"]);
        requiredMonths.forEach(m => {
          const valCuota = row[`Cuota ${m}`] ? row[`Cuota ${m}`].toString().trim() : "";
          if (valCuota === "") cuotasDeuda.push(m);

          if (!sinBalon.has(m)) {
            const valBalon = row[`Balon ${m}`] ? row[`Balon ${m}`].toString().trim() : "";
            if (valBalon === "") balonesDeuda.push(m);
          }
        });

        if (playerAdelantado > 0) {
          adelantosData.push({ nombre: nombreStr, amount: playerAdelantado });
        }

        playersData.push({
          nombre: nombreStr,
          totalIngresado: playerIngresado,
          totalAdelantado: playerAdelantado,
          cuotasDeuda,
          balonesDeuda
        });
      }

      stats.validRows++;
    } catch (e) {
      stats.ignoredRows++;
      stats.logs.push(`Fila ${index + 2} (${row.Nombre || 'Sin Nombre'}): ${e.message}`);
    }
  });

  // Filtrar meses futuros para la gráfica
  const filteredMonthlyStats = {};
  requiredMonths.forEach(m => {
    filteredMonthlyStats[m] = monthlyStats[m];
  });

  return {
    players: playersData,
    finances: {
      balanceNeto: totalIngresos - totalGastos,
      totalIngresos,
      totalGastos,
      totalDonaciones,
      monthlyStats: filteredMonthlyStats,
      adelantos: adelantosData.sort((a, b) => b.amount - a.amount)
    },
    stats
  };
}

const ImportStatusBanner = ({ stats }) => {
  if (!stats) return null;
  const hasErrors = stats.ignoredRows > 0;
  const [visible, setVisible] = React.useState(true);
  React.useEffect(() => {
    if (!hasErrors) {
      const t = setTimeout(() => setVisible(false), 4000);
      return () => clearTimeout(t);
    }
  }, [hasErrors]);
  if (!visible) return null;
  
  return (
    <div className={`mb-6 p-4 rounded-xl border ${hasErrors ? 'bg-brand-warning bg-opacity-10 border-brand-warning' : 'bg-brand-success bg-opacity-10 border-brand-success'}`}>
       <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
         <div>
           <h4 className={`font-bold flex items-center gap-2 ${hasErrors ? 'text-brand-warning' : 'text-brand-success'}`}>
             {hasErrors ? <Icons.Alert /> : <Icons.Check />} 
             Sincronización {hasErrors ? 'Parcial' : 'Completa'}
           </h4>
           <p className="text-sm text-gray-300 mt-1">
             <span className="font-bold">{stats.validRows}</span> registros importados correctamente. 
             {hasErrors && <span className="font-bold text-brand-warning ml-1">({stats.ignoredRows} filas ignoradas)</span>}
           </p>
         </div>
       </div>
       
       {hasErrors && (
         <div className="mt-4 bg-dark-card p-3 rounded-lg text-xs font-mono text-gray-400 max-h-32 overflow-y-auto">
           <p className="font-bold mb-2 text-gray-300">Logs de errores:</p>
           <ul className="space-y-1">
             {stats.logs.map((log, i) => <li key={i}>• {log}</li>)}
           </ul>
         </div>
       )}
    </div>
  );
};

// --- GRÁFICO FINANCIERO ---
const FinanceChart = ({ data }) => {
  const chartRef = useRef(null);
  const chartInstance = useRef(null);

  useEffect(() => {
    if (chartRef.current) {
      if (chartInstance.current) chartInstance.current.destroy();
      
      const labels = Object.keys(data);
      const ingresos = labels.map(l => data[l].ingresos);
      const gastos = labels.map(l => data[l].gastos);

      chartInstance.current = new Chart(chartRef.current, {
        type: 'bar',
        data: {
          labels,
          datasets: [
            { label: 'Ingresos', data: ingresos, backgroundColor: '#10b981', borderRadius: 4 },
            { label: 'Gastos', data: gastos, backgroundColor: '#ef4444', borderRadius: 4 }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: {
            y: { beginAtZero: true, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
            x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
          },
          plugins: {
            legend: { labels: { color: '#f8fafc' } },
            tooltip: { backgroundColor: '#1e293b', titleColor: '#fff', bodyColor: '#fff', borderColor: '#334155', borderWidth: 1 }
          }
        }
      });
    }
    return () => { if (chartInstance.current) chartInstance.current.destroy(); };
  }, [data]);

  return <canvas ref={chartRef}></canvas>;
};

  apiKey: "AIzaSyA9h6ZOs25zAf57A8AeENMZQj3UFa7Tg2Q",
  authDomain: "tolosacfmultas.firebaseapp.com",

};

function getFirebaseConfig() {
  const isPlaceholder = (val) => !val || val.includes("REEMPLAZAR_CON") || val.trim() === "";
  const config = DEFAULT_FIREBASE_CONFIG;
  if (!isPlaceholder(config.apiKey) && !isPlaceholder(config.projectId)) {
    return config;
  }
  try {
    const saved = localStorage.getItem('firebase_config');
    if (saved) {
      const parsed = JSON.parse(saved);
      if (!isPlaceholder(parsed.apiKey) && !isPlaceholder(parsed.projectId)) {
        return parsed;
      }
    }
  } catch (e) {
    console.error("Error al leer firebase_config de localStorage:", e);
  }
  return null;
}

function parseFirebaseSnippet(snippet) {
  try {
    const extractField = (field) => {
      const regex = new RegExp(`['"]?${field}['"]?\\s*:\\s*['"]([^'"]+)['"]`);
      const match = snippet.match(regex);
      return match ? match[1] : "";
    };
    return {
      apiKey: extractField("apiKey"),
      authDomain: extractField("authDomain"),
      projectId: extractField("projectId"),
      storageBucket: extractField("storageBucket"),
      messagingSenderId: extractField("messagingSenderId"),
      appId: extractField("appId")
    };
  } catch (e) {
    return null;
  }
}

    } else {
      firebaseApp = firebase.app();
    }
    firebaseAuth = firebase.auth();
    firebaseDb = firebase.firestore();
  } catch (e) {
    console.error("Error al inicializar Firebase:", e);
  }
}

const FirebaseSetupWizard = ({ onConfigSaved }) => {

  const handlePasteChange = (e) => {
    const val = e.target.value;
    setPasteSnippet(val);
    if (val.trim()) {
      const parsed = parseFirebaseSnippet(val);
      if (parsed && parsed.apiKey && parsed.projectId) {
        setApiKey(parsed.apiKey);
        setAuthDomain(parsed.authDomain);
        setProjectId(parsed.projectId);
        setStorageBucket(parsed.storageBucket);
        setMessagingSenderId(parsed.messagingSenderId);

    const cleanEmail = newEmail.trim().toLowerCase();
    if (!cleanEmail) return;
    
    if (allowedEmails.map(e => e.toLowerCase()).includes(cleanEmail)) {
      alert("Este correo ya está en la lista.");
      return;
    }
    
    setLoading(true);
    try {
      await firebaseDb.collection("config").doc("settings").update({
        allowed_emails: firebase.firestore.FieldValue.arrayUnion(cleanEmail)
      });
      setNewEmail("");
    } catch (e) {
      alert("Error al añadir correo: " + e.message);
    }
    setLoading(false);
  };

  const handleRemoveEmail = async (emailToRemove) => {
    if (confirm(`¿Estás seguro de que deseas revocar el acceso a ${emailToRemove}?`)) {
      try {
        await firebaseDb.collection("config").doc("settings").update({
          allowed_emails: firebase.firestore.FieldValue.arrayRemove(emailToRemove)
        });
      } catch (e) {
        alert("Error al eliminar correo: " + e.message);
      }
    }
  };

  const handleUpdateAdmin = async (e) => {
    e.preventDefault();
    const val = prompt("Introduce el correo del nuevo administrador (cuidado: perderás tus accesos de administrador si no estás en la whitelist):");
    if (!val || !val.trim()) return;
    const cleanAdmin = val.trim().toLowerCase();
    if (confirm(`¿Confirmas que deseas transferir el rol de administrador a: ${cleanAdmin}?`)) {
      try {
        await firebaseDb.collection("config").doc("settings").update({
          admin_email: cleanAdmin
        });
        alert("Administrador actualizado. Inicia sesión de nuevo.");
        firebaseAuth.signOut();
      } catch (e) {
        alert("Error al actualizar administrador: " + e.message);
      }
    }
  };

  return (
    <div className="space-y-6">
      <h2 className="text-2xl font-bold flex items-center gap-2">
        🛠️ Panel de Administración
      </h2>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
        {/* Whitelist Panel */}
        <Card className="border-t-4 border-t-brand-primary">
          <h3 className="text-xl font-semibold mb-2 flex items-center gap-2 text-brand-primary">
            👥 Jugadores Autorizados (Whitelist)
          </h3>
          <p className="text-xs text-gray-400 mb-4">
            Introduce los correos electrónicos de los jugadores que tienen permitido acceder a la aplicación.
          </p>

          <form onSubmit={handleAddEmail} className="flex gap-2 mb-6">
            <input
              type="email"
              value={newEmail}
              onChange={(e) => setNewEmail(e.target.value)}
              placeholder="jugador@correo.com"
              required
              className="flex-grow bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-slate-200 focus:outline-none focus:border-brand-primary"
            />
            <button
              type="submit"
              disabled={loading}
              className="bg-brand-primary hover:bg-blue-600 text-white font-bold px-4 py-2 rounded-lg text-sm transition-all shadow-md flex items-center gap-2 disabled:opacity-50"
            >
              {loading ? "Añadiendo..." : "Autorizar"}
            </button>
          </form>

          <div className="space-y-2 max-h-80 overflow-y-auto pr-1 scrollbar-hide">
            {allowedEmails.length === 0 ? (
              <p className="text-gray-500 italic text-center py-4 text-sm">No hay jugadores autorizados. Añade uno arriba.</p>
            ) : (
              allowedEmails.map((email) => (
                <div key={email} className="flex justify-between items-center bg-dark-card bg-opacity-50 p-3 rounded-lg border border-slate-800">
                  <span className="font-medium text-sm text-slate-300 font-mono">{email}</span>
                  <button
                    onClick={() => handleRemoveEmail(email)}
                    className="text-brand-danger hover:bg-brand-danger hover:bg-opacity-10 p-1.5 rounded-lg transition-all"
                    title="Eliminar autorización"
                  >
                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                    </svg>
                  </button>
                </div>
              ))
            )}
          </div>
        </Card>

        {/* Configurations Panel */}
        <div className="space-y-6">
          <Card className="border-t-4 border-t-brand-purple">
            <h3 className="text-xl font-semibold mb-2 flex items-center gap-2 text-brand-purple">
              ⚙️ Ajustes del Sistema
            </h3>
            <p className="text-xs text-gray-400 mb-4">Configuración del administrador del sistema y bases de datos.</p>

            <div className="space-y-4">
              <div className="p-3 bg-slate-900 rounded-lg flex justify-between items-center border border-slate-800">
                <div>
                  <p className="text-[10px] text-gray-400 uppercase tracking-wider">Correo Administrador</p>
                  <p className="text-sm font-bold text-slate-200 font-mono mt-0.5">{adminEmail}</p>
                </div>
                <button
                  onClick={handleUpdateAdmin}
                  className="bg-brand-purple bg-opacity-20 text-brand-purple border border-brand-purple border-opacity-30 hover:bg-opacity-30 px-3 py-1.5 rounded-lg text-xs font-bold transition-all"
                >
                  Cambiar Admin
                </button>
              </div>

              <div className="p-3 bg-slate-900 rounded-lg border border-slate-800">
                <p className="text-[10px] text-gray-400 uppercase tracking-wider mb-1">Enlace Google Sheets Actual</p>
                <div className="text-xs font-mono text-slate-300 break-all select-all p-2 bg-dark rounded border border-slate-800 max-h-24 overflow-y-auto scrollbar-hide">
                  {googleSheetsUrl || "Ninguno"}
                </div>
              </div>

              <div className="pt-2">
                <button
                  onClick={() => {
                    if (confirm("¿Estás seguro de que deseas eliminar la configuración local de Firebase? Esto te desconectará del servidor.")) {
                      localStorage.removeItem('firebase_config');
                      onResetConfig();
                    }
                  }}
                  className="text-xs text-brand-danger hover:underline font-bold"
                >
                  Restablecer Configuración de Firebase (Local)
                </button>
              </div>
            </div>
          </Card>
        </div>
      </div>
    </div>
  );
};

// --- APP PRINCIPAL ---
const App = () => {
  const [firebaseConfig, setFirebaseConfig] = useState(() => getFirebaseConfig());
  const [user, setUser] = useState(null);
  const [userEmail, setUserEmail] = useState("");
  const [isAdmin, setIsAdmin] = useState(false);
  const [settings, setSettings] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);

  const [activeTab, setActiveTab] = useState('finanzas');
  const [data, setData] = useState({ players: [], finances: null });
  const [currentMonthName, setCurrentMonthName] = useState("");
  const [isLoading, setIsLoading] = useState(true);

  // Escuchar estado de autenticación en Firebase
  useEffect(() => {
    if (!firebaseAuth) {
      setAuthLoading(false);
      return;
    }

    const unsubscribe = firebaseAuth.onAuthStateChanged(async (currentUser) => {
      if (currentUser) {
        const email = currentUser.email.toLowerCase();
        setUser(currentUser);
        setUserEmail(email);

        try {
          const docRef = firebaseDb.collection("config").doc("settings");
          let doc = await docRef.get();
          
          if (!doc.exists) {
            // El documento no existe en Firestore, si el email es el admin por defecto lo creamos
            if (email === "aitor@gmail.com") {
              const defaultSettings = {
                admin_email: "aitor@gmail.com",
                allowed_emails: [],
                google_sheets_url: GOOGLE_SHEETS_CSV_URL
              };
              await docRef.set(defaultSettings);
              doc = await docRef.get();
            } else {
              throw new Error("La base de datos de Firestore no está inicializada.");
            }
          }

          const data = doc.data();
          setSettings(data);
          
          const adminEmail = data.admin_email ? data.admin_email.toLowerCase() : "aitor@gmail.com";
          const allowedList = data.allowed_emails ? data.allowed_emails.map(e => e.toLowerCase()) : [];
          
          if (email === adminEmail) {
            setIsAdmin(true);
          } else if (allowedList.includes(email)) {
            setIsAdmin(false);
          } else {
            throw new Error("Acceso denegado. Tu correo no está en la lista de jugadores autorizados.");
          }
        } catch (e) {
          console.error("Error de autorización:", e);
          alert(e.message);
          firebaseAuth.signOut();
          setUser(null);
          setUserEmail("");
          setIsAdmin(false);
          setSettings(null);
        }
      } else {
        setUser(null);
        setUserEmail("");
        setIsAdmin(false);
        setSettings(null);
      }
      setAuthLoading(false);
    });

    return () => unsubscribe();
  }, [firebaseConfig]);

  // Escucha de Firestore en tiempo real para cambios en configuraciones (Sheets, Whitelist, etc.)
  useEffect(() => {
    if (!user || !firebaseDb) return;

    const unsubscribe = firebaseDb.collection("config").doc("settings").onSnapshot((doc) => {
      if (doc.exists) {
        const data = doc.data();
        setSettings(data);
        
        const email = user.email.toLowerCase();
        const adminEmail = data.admin_email ? data.admin_email.toLowerCase() : "aitor@gmail.com";
        const allowedList = data.allowed_emails ? data.allowed_emails.map(e => e.toLowerCase()) : [];
        
        if (email === adminEmail) {
          setIsAdmin(true);
        } else if (allowedList.includes(email)) {
          setIsAdmin(false);
        } else {
          alert("Tu acceso ha sido revocado por el administrador.");
          firebaseAuth.signOut();
        }
      }
    }, (error) => {
      console.error("Error al escuchar cambios de Firestore:", error);
    });

    return () => unsubscribe();
  }, [user]);

  // Carga de datos de Google Sheets
  useEffect(() => {
    const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
    setCurrentMonthName(monthNames[new Date().getMonth()]);

    if (!user || !settings) {
      return;
    }

    setIsLoading(true);
    const sheetUrl = settings.google_sheets_url || GOOGLE_SHEETS_CSV_URL;

    if (sheetUrl === "PEGAR_ENLACE_AQUI") {
      const parsed = processData(MOCK_SHEET_DATA);
      setData(parsed);
      setIsLoading(false);
    } else {
      const csvUrl = toDirectCsvUrl(sheetUrl);
      
      Papa.parse(csvUrl, {
        download: true,
        header: false,
        skipEmptyLines: true,
        complete: (results) => {
          try {
            const firstCell = results.data && results.data[0] && results.data[0][0] ? results.data[0][0].toString() : "";
            if (firstCell.includes("<!DOCTYPE") || firstCell.includes("<html") || firstCell.includes("google.com/accounts")) {
              throw new Error("Google Sheets devolvió una página HTML en vez de CSV. Asegúrate de que el documento es público: Compartir → Cualquier persona con el enlace → Lector.");
            }
            
            const normalized = normalizeSheetData(results.data);
            const parsed = processData(normalized);
            if (parsed.players.length === 0) {
              throw new Error("No se encontraron jugadores en el CSV. Revisa el formato del sheet.");
            }
            setData(parsed);
          } catch (e) {
            console.error("Error al procesar los datos:", e);
            alert("Error al cargar los datos:\n\n" + e.message + "\n\nSe mostrarán datos de ejemplo.");
            setData(processData(MOCK_SHEET_DATA));
          }
          setIsLoading(false);
        },
        error: (error) => {
          console.error("Error de red leyendo Google Sheets:", error);
          alert("No se pudo conectar con Google Sheets.\n\nComprueba:\n1. El enlace es correcto\n2. El documento es público (Compartir → Cualquier persona con el enlace → Lector)\n\nSe mostrarán datos de ejemplo.");
          setData(processData(MOCK_SHEET_DATA));
          setIsLoading(false);
        }
      });
    }
  }, [user, settings]);

  const handleConfigUrl = async () => {
    if (!isAdmin || !settings) return;
    const currentUrl = settings.google_sheets_url || GOOGLE_SHEETS_CSV_URL;
    const newUrl = prompt(
      "Introduce el enlace de tu Google Sheets.\n\n✅ REQUISITO: El documento debe ser PÚBLICO.\n   → Compartir → Cualquier persona con el enlace → Lector\n\nPega el enlace normal (lo convertiremos automáticamente a CSV):",
      currentUrl === "PEGAR_ENLACE_AQUI" ? "" : currentUrl
    );
    
    if (newUrl !== null && newUrl.trim() !== "") {
      const urlToSave = toDirectCsvUrl(newUrl.trim());
      try {
        await firebaseDb.collection("config").doc("settings").update({
          google_sheets_url: urlToSave
        });
        alert("Enlace actualizado en Firestore. Se actualizará en todas las pantallas.");
      } catch (e) {
        alert("Error al actualizar enlace: " + e.message);
      }
    }
  };

  // 1. Mostrar pantalla de setup si no hay configuración de Firebase
  if (!firebaseConfig) {
    return <FirebaseSetupWizard onConfigSaved={(cfg) => setFirebaseConfig(cfg)} />;
  }

  // 2. Mostrar spinner mientras valida el estado de Auth
  if (authLoading) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-dark">
        <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-brand-primary"></div>
      </div>
    );
  }

  // 3. Mostrar pantalla de login si no hay usuario autenticado
  if (!user) {
    return <LoginScreen onResetConfig={() => setFirebaseConfig(null)} />;
  }

  // 4. Mostrar spinner si los settings de Firestore aún no se han cargado
  if (!settings || isLoading) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-dark">
        <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-brand-primary"></div>
      </div>
    );
  }

  const renderContent = () => {
    switch(activeTab) {
      case 'finanzas': return <Finanzas finances={data.finances} />;
      case 'dashboard': return <Dashboard players={data.players} />;
      case 'cuotas': return <SectionDebt players={data.players} type="Cuota" title="Cuotas" icon={<Icons.Money />} dataKey="cuotasDeuda" />;
      case 'balones': return <SectionDebt players={data.players} type="Balón" title="Balones" icon={<Icons.Ball />} dataKey="balonesDeuda" />;
      case 'players': return <PlayersList players={data.players} />;
      case 'admin': return <AdminPanel settings={settings} firebaseDb={firebaseDb} onResetConfig={() => setFirebaseConfig(null)} />;
      default: return <Finanzas finances={data.finances} />;
    }
  };

  const tabs = [
    { id: 'finanzas', label: 'Finanzas', icon: <Icons.Money /> },
    { id: 'dashboard', label: 'Jugadores', icon: <Icons.User /> },
    { id: 'cuotas', label: 'Cuotas', icon: <Icons.Money /> },
    { id: 'balones', label: 'Balones', icon: <Icons.Ball /> },
    { id: 'players', label: 'Plantilla', icon: <Icons.User /> },
  ];
  if (isAdmin) {
    tabs.push({ id: 'admin', label: 'Admin', icon: <Icons.Settings /> });
  }

  return (
    <div className="min-h-screen text-slate-200">
      <header className="bg-dark-paper border-b border-slate-700 sticky top-0 z-10 backdrop-blur-md bg-opacity-80">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div className="flex justify-between items-center h-16">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-brand-primary to-brand-success flex items-center justify-center shadow-lg hidden sm:flex">
                <Icons.TrendingUp className="text-white" />
              </div>
              <div>
                <h1 className="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400 leading-tight">
                  Multas <span className="text-brand-primary">Wall Street</span>
                </h1>
                <p className="text-[10px] text-gray-400 font-mono uppercase tracking-widest mt-0.5">Balance Neto: {data.finances ? data.finances.balanceNeto : 0}€</p>
              </div>
            </div>
            <div className="flex items-center gap-4">
              <div className="hidden md:flex space-x-1">
                {tabs.map(tab => (
                  <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-4 py-2 rounded-lg flex items-center gap-2 transition-colors duration-200 ${activeTab === tab.id ? 'bg-dark text-brand-primary font-medium shadow-inner' : 'text-gray-400 hover:text-white hover:bg-dark-card'}`}>
                    <div className="w-4 h-4">{tab.icon}</div>{tab.label}
                  </button>
                ))}
              </div>
              {isAdmin && (
                <button onClick={handleConfigUrl} className="bg-dark-card border border-slate-600 hover:border-brand-primary hover:text-brand-primary text-gray-300 px-3 py-2 rounded-lg flex items-center gap-2 transition-all shadow-sm text-sm font-medium">
                  <Icons.Settings />
                  <span className="hidden sm:inline">Configurar Google Sheets</span>
                </button>
              )}
              <div className="flex items-center gap-2 bg-dark bg-opacity-50 px-3 py-1.5 rounded-lg border border-slate-700">
                <div className="w-2 h-2 rounded-full bg-brand-success animate-pulse"></div>
                <span className="text-xs text-gray-300 font-mono hidden md:inline max-w-[120px] truncate" title={userEmail}>
                  {userEmail}
                </span>
                <button onClick={() => firebaseAuth.signOut()} className="text-gray-400 hover:text-brand-danger transition-colors p-1 ml-1" title="Cerrar sesión">
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 pb-24 md:pb-8">
        {data.stats && <ImportStatusBanner stats={data.stats} />}
        {data.players.length > 0 ? renderContent() : (
          <div className="flex flex-col items-center justify-center h-64 bg-dark-card rounded-2xl border border-dashed border-slate-600 p-8 text-center mt-10">
             <div className="text-brand-danger mb-4"><Icons.Alert /></div>
             <h2 className="text-xl font-bold mb-2">No se han podido cargar los datos</h2>
             <p className="text-gray-400 mb-6 max-w-md">El enlace configurado no es válido o el documento no es público. Vuelve a configurar el enlace de Google Sheets.</p>
             {isAdmin && (
               <button onClick={handleConfigUrl} className="bg-brand-primary text-white px-6 py-3 rounded-lg font-bold shadow-lg hover:bg-blue-600 transition-colors flex items-center gap-2">
                 <Icons.Settings /> Configurar Enlace
               </button>
             )}
          </div>
        )}
      </main>

      <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-dark-paper border-t border-slate-700 pb-safe z-20 overflow-x-auto scrollbar-hide">
        <div className="flex items-center h-16 px-2 min-w-max space-x-4">
          {tabs.map(tab => (
            <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center justify-center w-16 h-full space-y-1 ${activeTab === tab.id ? 'text-brand-primary' : 'text-gray-500'}`}>
              <div className="w-6 h-6">{tab.icon}</div><span className="text-[10px] font-medium">{tab.label}</span>
            </button>
          ))}
        </div>
      </nav>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</head>
<body class="bg-dark min-h-screen">
    <div id="root"></div>
</body>
